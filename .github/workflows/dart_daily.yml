name: DART Daily Filter DM

on:
  schedule:
    - cron: "10 9 * * *" # 18:10 KST
  workflow_dispatch:
    inputs:
      days_ago:
        description: "0=오늘, 1=어제"
        required: false
        default: "0"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bot
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DAYS_AGO: ${{ github.event.inputs.days_ago || '0' }}
        run: |
          SCRIPT="dart_filter_to_telegram.py"
          if [ ! -f "$SCRIPT" ]; then SCRIPT="dart_filter_to_telegram"; fi
          python "$SCRIPT" --days-ago "$DAYS_AGO"
